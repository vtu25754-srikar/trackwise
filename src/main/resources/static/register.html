<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link rel="stylesheet" href="auth.css">
</head>
<body>

<div class="auth-card">
    <h2>Sign Up</h2>

    <div class="input-group">
        <input type="text" id="name" placeholder="User name">
    </div>

    <div class="input-group">
        <input type="email" id="email" placeholder="Email">
    </div>

    <div class="input-group">
        <input type="password" id="password" placeholder="Password">
    </div>

    <div class="input-group">
        <input type="number" id="monthlyLimit" placeholder="Monthly Limit">
    </div>

    <button class="auth-btn" onclick="register()">Sign up</button>

    <div class="auth-bottom">
        <a href="login.html">Login</a>
    </div>
</div>

<script>
function register() {
    fetch("http://localhost:9090/api/auth/register", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            name: document.getElementById("name").value,
            email: document.getElementById("email").value,
            password: document.getElementById("password").value,
            monthlyLimit: parseFloat(document.getElementById("monthlyLimit").value)
        })
    })
    .then(res => res.json())
    .then(data => {
        alert("Registered Successfully");
        window.location.href = "login.html";
    })
    .catch(err => alert("Registration failed"));
}
</script>

</body>
</html>
