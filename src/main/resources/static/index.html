<!DOCTYPE html>
<html>
<head>
    <title>TrackWise - Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>TrackWise - Expense Tracker</h1>

<a href="settings.html">
    <button>Settings</button>
</a>

<button onclick="logout()">Logout</button>

<div class="form-container">

    <input type="hidden" id="expenseId">

    <input type="text" id="title" placeholder="Title">
    <input type="number" id="amount" placeholder="Amount">
    <input type="date" id="date">

    <select id="categoryId">
        <option value="">Select Category</option>
    </select>

    <button onclick="saveExpense()" id="saveBtn">Add Expense</button>
    <button onclick="cancelEdit()" id="cancelBtn" 
            style="display:none; background-color: gray;">
        Cancel
    </button>

</div>

<h2>All Expenses</h2>

<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Amount</th>
            <th>Date</th>
            <th>User</th>
            <th>Category</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody id="expenseTable"></tbody>
</table>

<div id="warningModal" class="modal">
    <div class="modal-content">
        <h3>⚠ Monthly Limit Exceeded!</h3>
        <p id="warningText"></p>
        <button onclick="closeModal()">Close</button>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
