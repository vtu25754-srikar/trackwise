<!DOCTYPE html>
<html>
<head>
    <title>TrackWise - Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>TrackWise - Expense Tracker</h1>

<div class="form-container">

    <input type="hidden" id="expenseId">

    <input type="text" id="title" placeholder="Title">
    <input type="number" id="amount" placeholder="Amount">
    <input type="date" id="date">
    <input type="number" id="userId" placeholder="User ID">
    <input type="number" id="categoryId" placeholder="Category ID">

    <button onclick="saveExpense()" id="saveBtn">Add Expense</button>
    <button onclick="cancelEdit()" id="cancelBtn" style="display:none; background-color: gray;">
        Cancel
    </button>

</div>

<h2>All Expenses</h2>

<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Amount</th>
            <th>Date</th>
            <th>User</th>
            <th>Category</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody id="expenseTable"></tbody>
</table>

<script src="script.js"></script>

</body>
</html>
