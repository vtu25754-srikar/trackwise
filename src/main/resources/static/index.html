<!DOCTYPE html>
<html>
<head>
    <title>TrackWise - Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <!-- Header -->
    <div class="header">
        <h1>TrackWise</h1>
        <div class="header-actions">
            <a href="settings.html" class="btn secondary">Settings</a>
            <button onclick="logout()" class="btn danger">Logout</button>
        </div>
    </div>

    <!-- Add Expense Card -->
    <div class="card">
        <h2>Add Expense</h2>

        <input type="hidden" id="expenseId">

        <div class="form-row">
            <input type="text" id="title" placeholder="Title">
            <input type="number" id="amount" placeholder="Amount">
            <input type="date" id="date">
            <select id="categoryId">
                <option value="">Select Category</option>
            </select>
        </div>

        <div class="form-actions">
            <button onclick="saveExpense()" id="saveBtn" class="btn primary">
                + Add Expense
            </button>
            <button onclick="cancelEdit()" id="cancelBtn" 
                    class="btn gray" style="display:none;">
                Cancel
            </button>
        </div>
    </div>

    <!-- Expense Table Card -->
    <div class="card">
        <h2>All Expenses</h2>

        <table>
            <thead>
                <tr>
                    <th>Title</th>
                    <th>Amount</th>
                    <th>Date</th>
                    <th>Category</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="expenseTable"></tbody>
        </table>
    </div>

</div>

<!-- Warning Modal -->
<div id="warningModal" class="modal">
    <div class="modal-content">
        <h3>⚠ Monthly Limit Exceeded</h3>
        <p id="warningText"></p>
        <button onclick="closeModal()" class="btn primary">Close</button>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
