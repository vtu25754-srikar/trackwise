<!DOCTYPE html>
<html>
<body>

<h2>Register User</h2>

<button onclick="register()">Register</button>

<hr>

<h2>Add Expense</h2>

<input type="number" id="userId" placeholder="User ID"><br><br>
<input type="text" id="title" placeholder="Title"><br><br>
<input type="number" id="amount" placeholder="Amount"><br><br>

<button onclick="addExpense()">Add Expense</button>

<script>

function register() {
    fetch("/api/users/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            username: "srikar",
            password: "12345"
        })
    })
    .then(res => res.json())
    .then(data => alert("User Registered with ID: " + data.id));
}

function addExpense() {
    fetch("/api/expenses/" + document.getElementById("userId").value, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            title: document.getElementById("title").value,
            amount: document.getElementById("amount").value
        })
    })
    .then(res => res.json())
    .then(data => alert("Expense Added Successfully"));
}

</script>

</body>
</html>
